# netlify.toml — configuração do site BSafe Bitcoin

[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/xpub"
  to = "/.netlify/functions/xpub"
  status = 200

